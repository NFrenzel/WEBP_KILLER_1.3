<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WEBP to PNG</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      width: 250px;
      margin: 0;
      background: #fff;
    }

    #pasteArea {
      border: 2px dashed #4CAF50;
      border-radius: 5px;
      padding: 12px;
      text-align: center;
      color: #777;
      min-height: 150px;
      margin-bottom: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    #pasteArea.hover {
      background: #f0f0f0;
    }

    #pasteMessage {
      pointer-events: none;
    }

    #previewContainer {
      width: 100%;
      max-height: 220px;
      overflow: auto;
    }

    #previewContainer canvas,
    #previewContainer img {
      display: block;
      max-width: 100%;
      height: auto;
      margin: 0 auto;
    }

    #downloadButton {
      background: #4CAF50;
      color: white;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      border-radius: 5px;
      width: 100%;
      border: none;
      font-size: 14px;
    }

    #downloadButton:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #downloadButton:focus {
      outline: none;
    }
  </style>
</head>
<body>
  <h3>Paste the image here (Ctrl+V)</h3>

  <div id="pasteArea" tabindex="0">
    <div id="pasteMessage">Click here and press Ctrl+V</div>
    <div id="previewContainer"></div>
  </div>

  <button id="downloadButton" disabled>Convert and Download PNG</button>
  <script src="popup.js"></script>
</body>
</html>
